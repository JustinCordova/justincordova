<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Justin Cordova</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Background video 
    <video autoplay muted loop id="bg-video">
      <source src="video/background.mp4" type="video/mp4" />
      <source src="video/background.webm" type="video/webm" />
      Your browser does not support the video tag.
    </video> -->

    <!-- Header section -->
    <header>
      <h1>Justin Cordova</h1>
      <nav>
        <ul>
          <li><a href="about.html">About</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#experience">Experience</a></li>
          <li><a href="#education">Education</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="#photography">Photography</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- Main content -->
    <main>
      <div class="content">
        <!-- Thin Rectangle Pause/Play Button -->
        <div class="controls">
          <div id="play-pause-button" onclick="togglePlayPause()"></div>
        </div>

        <div class="song-list">
          <div
            class="song-item"
            onclick="playSong('audio/My Castle Town - Undertale.mp3')"
          >
            <img src="img/song-art1.jpeg" alt="Song Art 1" class="song-art" />
          </div>
          <div
            class="song-item"
            onclick="playSong('audio/Merry-Go-Round Piano - Joe Hisaishi.mp3')"
          >
            <img src="img/song-art2.jpeg" alt="Song Art 2" class="song-art" />
          </div>
          <div
            class="song-item"
            onclick="playSong('audio/Rue des trois frères - Frabrizio Paterlini.mp3')"
          >
            <img src="img/song-art3.jpeg" alt="Song Art 3" class="song-art" />
          </div>
        </div>
      </div>
    </main>

    <!-- Footer section -->
    <footer>
      <p>&copy; 2024 Justin Cordova</p>
    </footer>

    <audio
      id="audio-player"
      style="display: none"
      controls
      autplay
      muted
    ></audio>
    <!-- Hidden audio player -->

    <script src="script.js"></script>
    <!-- External JavaScript file -->
  </body>
</html>
